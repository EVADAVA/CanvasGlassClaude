<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Canvas & Glass Links</title>
  <style>
    :root {
      --bg: #f4efe6;
      --ink: #1a1712;
      --muted: #6a6257;
      --panel: rgba(255,255,255,.82);
      --line: rgba(26,23,18,.12);
      --accent: #a5812c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top, rgba(165,129,44,.16), transparent 34%),
        linear-gradient(180deg, #f8f3ea 0%, var(--bg) 100%);
    }
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 56px 20px 72px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 28px;
      backdrop-filter: blur(12px);
      box-shadow: 0 18px 48px rgba(0,0,0,.08);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 3.6rem);
      line-height: .95;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    p, li { color: var(--muted); line-height: 1.6; }
    a { color: var(--ink); }
    .cta {
      display: inline-block;
      margin-top: 14px;
      padding: 12px 18px;
      border-radius: 999px;
      text-decoration: none;
      color: white;
      background: var(--ink);
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <h1>Canvas &amp; Glass Links</h1>
      <p>
        This domain is the canonical landing and redirect surface for episode-specific playlist
        and painting QR flows.
      </p>
      <p>
        Painting landing pages are reserved by slug in the format
        <code>episode_painting</code>, for example <code>001_1</code>.
      </p>
      <a class="cta" href="/paintings">Open Reserved Painting Routes</a>
    </section>
  </main>
</body>
</html>
