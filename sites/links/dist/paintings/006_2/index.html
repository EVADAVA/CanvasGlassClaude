<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Canvas & Glass · Episode 006 · Painting 2</title>
  <style>
    :root {
      --bg: #f6f1e7;
      --ink: #181410;
      --muted: #6e665b;
      --panel: rgba(255,255,255,.84);
      --line: rgba(24,20,16,.10);
      --accent: #9a7829;
      --soft: #ece4d4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(154,120,41,.18), transparent 30%),
        linear-gradient(180deg, #faf6ef 0%, var(--bg) 100%);
    }
    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }
    .hero {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 18px 44px rgba(0,0,0,.07);
      backdrop-filter: blur(10px);
      padding: 28px;
    }
    h1, h2 { margin: 0; text-transform: uppercase; letter-spacing: .05em; }
    h1 { font-size: clamp(1.7rem, 4vw, 3rem); line-height: .95; }
    h2 { font-size: .9rem; color: var(--muted); margin-bottom: 10px; }
    p { color: var(--muted); line-height: 1.6; }
    .meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 18px;
    }
    .pill {
      padding: 12px 14px;
      border-radius: 16px;
      background: var(--soft);
      color: var(--ink);
      font-size: .95rem;
    }
    .cta {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 18px;
      border-radius: 999px;
      text-decoration: none;
      color: white;
      background: var(--ink);
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <h2>Links.Evadava.com</h2>
      <h1>Episode 006 · Painting 2</h1>
      <p>
        This page is reserved for the final Canvas & Glass painting landing.
        The QR target is stable; painting content, store link, and redirect logic will be attached later.
      </p>
      <div class="meta">
        <div class="pill">Slug: 006_2</div>
        <div class="pill">Episode: 006</div>
        <div class="pill">Painting: 2</div>
      </div>
      <a class="cta" href="/paintings">Back to reserved routes</a>
    </section>
  </main>
</body>
</html>
