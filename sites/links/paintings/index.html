<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Canvas & Glass Painting Landing</title>
  <style>
    :root {
      --bg: #f6f1e7;
      --ink: #181410;
      --muted: #6e665b;
      --panel: rgba(255,255,255,.84);
      --line: rgba(24,20,16,.10);
      --accent: #9a7829;
      --soft: #ece4d4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(154,120,41,.18), transparent 30%),
        linear-gradient(180deg, #faf6ef 0%, var(--bg) 100%);
    }
    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }
    .hero, .grid, .notice {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 18px 44px rgba(0,0,0,.07);
      backdrop-filter: blur(10px);
    }
    .hero { padding: 28px; margin-bottom: 20px; }
    .notice { padding: 18px 20px; margin-top: 18px; display: none; }
    h1, h2 { margin: 0; text-transform: uppercase; letter-spacing: .05em; }
    h1 { font-size: clamp(1.7rem, 4vw, 3rem); line-height: .95; }
    h2 { font-size: .9rem; color: var(--muted); margin-bottom: 10px; }
    p { color: var(--muted); line-height: 1.6; }
    .meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 18px;
    }
    .pill {
      padding: 12px 14px;
      border-radius: 16px;
      background: var(--soft);
      color: var(--ink);
      font-size: .95rem;
    }
    .grid { padding: 22px; }
    .routes {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .route {
      display: block;
      padding: 12px 10px;
      border-radius: 16px;
      background: white;
      border: 1px solid var(--line);
      color: var(--ink);
      text-decoration: none;
      text-align: center;
    }
    .route.active { outline: 2px solid var(--accent); }
    code { font-family: "SFMono-Regular", Menlo, monospace; }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <h2>Links.Evadava.com</h2>
      <h1 id="title">Painting Landing Route</h1>
      <p id="summary">
        This route is reserved for an episode painting landing page and QR destination.
      </p>
      <div class="meta">
        <div class="pill" id="slug-pill">Slug: loading...</div>
        <div class="pill" id="episode-pill">Episode: loading...</div>
        <div class="pill" id="painting-pill">Painting: loading...</div>
      </div>
      <div class="notice" id="notice"></div>
    </section>

    <section class="grid">
      <h2>Reserved Routes</h2>
      <p>
        The first 60 painting landing routes are pre-reserved in the format
        <code>001_1</code> through <code>020_3</code>.
      </p>
      <div class="routes" id="routes"></div>
    </section>
  </main>

  <script>
    const data = {
      routes: [
        "001_1","001_2","001_3","002_1","002_2","002_3","003_1","003_2","003_3","004_1","004_2","004_3",
        "005_1","005_2","005_3","006_1","006_2","006_3","007_1","007_2","007_3","008_1","008_2","008_3",
        "009_1","009_2","009_3","010_1","010_2","010_3","011_1","011_2","011_3","012_1","012_2","012_3",
        "013_1","013_2","013_3","014_1","014_2","014_3","015_1","015_2","015_3","016_1","016_2","016_3",
        "017_1","017_2","017_3","018_1","018_2","018_3","019_1","019_2","019_3","020_1","020_2","020_3"
      ]
    };

    const parts = location.pathname.replace(/\/+$/,'').split('/');
    const slug = parts.length > 2 ? parts[2] : '';
    const valid = data.routes.includes(slug);
    const current = valid ? slug : data.routes[0];
    const [episode, painting] = current.split('_');

    document.getElementById('slug-pill').textContent = `Slug: ${current}`;
    document.getElementById('episode-pill').textContent = `Episode: ${episode}`;
    document.getElementById('painting-pill').textContent = `Painting: ${painting}`;
    document.getElementById('title').textContent = `Episode ${episode} · Painting ${painting}`;

    const notice = document.getElementById('notice');
    if (!valid && slug) {
      notice.style.display = 'block';
      notice.textContent = `Requested slug "${slug}" is not reserved yet. Showing the first reserved route instead.`;
    } else {
      notice.style.display = 'block';
      notice.textContent = 'This page is currently a reserved landing placeholder. Final painting content and redirects will be attached per episode.';
    }

    const routes = document.getElementById('routes');
    for (const item of data.routes) {
      const a = document.createElement('a');
      a.className = 'route' + (item === current ? ' active' : '');
      a.href = `/paintings/${item}`;
      a.textContent = item;
      routes.appendChild(a);
    }
  </script>
</body>
</html>
